<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <title>Termék módosítása: {{ sorszam }}</title>
</head>
<body>
    <h1>Termék módosítása: {{ sorszam }}</h1>
    <form id="editForm">
        {% for field in mezok %}
            <label for="{{ field }}">{{ field }}:</label>
            {% if field in listak %}
                <select id="{{ field }}" name="{{ field }}">
                    {% for option in listak[field] %}
                        <option value="{{ option }}" {% if row[field] == option %}selected{% endif %}>{{ option }}</option>
                    {% endfor %}
                </select>
            {% else %}
                <input type="text" id="{{ field }}" name="{{ field }}" value="{{ row.get(field, '') }}">
            {% endif %}
            <br><br>
        {% endfor %}
        <button type="button" onclick="saveChanges()">Mentés</button>
    </form>

    <script>
        function saveChanges() {
            var formData = {};
            document.querySelectorAll('input, select').forEach(function(elem) {
                formData[elem.name] = elem.value;
            });
            fetch('/edit/{{ sorszam }}', {
                method: 'PUT',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(formData)
            }).then(response => {
                if (response.ok) {
                    alert('Adatok frissítve!');
                    window.location.reload();
                } else {
                    response.json().then(data => {
                        alert('Hiba történt: ' + (data.message || 'Ismeretlen hiba'));
                    });
                }
            }).catch(error => {
                alert('Hiba történt: ' + error);
            });
        }
    </script>
</body>
</html>
