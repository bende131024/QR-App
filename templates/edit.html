<!DOCTYPE html>
<html>
<head>
    <title>Termék módosítása: {{ azonosito }}</title>
</head>
<body>
    <h1>Termék módosítása: {{ azonosito }}</h1>
    <form id="editForm" method="POST">
        {% for field in mezok %}
            <p>
                {{ field }}:
                {% if field == "Azonosító" %}
                    <input type="text" name="{{ field }}" value="{{ row[field] }}" readonly>
                {% elif field in listak %}
                    <select name="{{ field }}">
                        {% for option in listak[field] %}
                            <option value="{{ option }}" {% if row[field] == option %}selected{% endif %}>{{ option }}</option>
                        {% endfor %}
                    </select>
                {% else %}
                    <input type="text" name="{{ field }}" value="{{ row[field] }}">
                {% endif %}
            </p>
        {% endfor %}
        <button type="submit">Mentés</button>
    </form>
    <script>
        document.getElementById("editForm").addEventListener("submit", function(e) {
            e.preventDefault();
            const formData = {};
            document.querySelectorAll("#editForm input, #editForm select").forEach(input => {
                formData[input.name] = input.value;
            });
            fetch(`/edit/{{ azonosito }}`, {
                method: "PUT",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(formData)
            }).then(response => response.json()).then(data => {
                if (data.status === "success") {
                    alert("Sikeresen módosítva!");
                    window.location.href = "/data";
                } else {
                    alert("Hiba: " + data.message);
                }
            });
        });
    </script>
</body>
</html>
